<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>コード進行</title>
</head>

<body>
    <div id="header">
        <span>Key=</span>
        <select id="key">
            <option>C</option>
            <option>D♭</option>
            <option>D</option>
            <option>E♭</option>
            <option>E</option>
            <option>F</option>
            <option>G♭</option>
            <option>G</option>
            <option>A♭</option>
            <option>A</option>
            <option>B♭</option>
            <option>B</option>
            <option>Cm</option>
            <option>C#m</option>
            <option>Dm</option>
            <option>E♭m</option>
            <option>Em</option>
            <option>Fm</option>
            <option>F#m</option>
            <option>Gm</option>
            <option>G#m</option>
            <option>Am</option>
            <option>B♭m</option>
            <option>Bm</option>
        </select>
        <span>BPM=</span>
        <input type="number" id="bpm" value="120">
        <br>
        <select id="chord1">
            <option>C</option>
            <option>D</option>
            <option>E</option>
            <option>F</option>
            <option>G</option>
            <option>A</option>
            <option>B</option>
        </select>
        <select id="chord2">
            <option></option>
            <option>#</option>
            <option>♭</option>
        </select>
        <select id="chord3">
            <option></option>
            <option>m</option>
            <option>7</option>
            <option>m7</option>
            <option>M7</option>
            <option>mM7</option>
            <option>6</option>
            <option>m6</option>
            <option>sus4</option>
            <option>7sus4</option>
            <option>m7-5</option>
            <option>dim</option>
            <option>aug</option>
        </select>
        <span>(</span>
        <select id="tension" multiple>
            <option></option>
            <option>♭9</option>
            <option>9</option>
            <option>#9</option>
            <option>#11</option>
            <option>♭13</option>
            <option>13</option>
        </select>
        <span>)on</span>
        <select id="onchord1">
            <option></option>
            <option>C</option>
            <option>D</option>
            <option>E</option>
            <option>F</option>
            <option>G</option>
            <option>A</option>
            <option>B</option>
        </select>
        <select id="onchord2">
            <option></option>
            <option>#</option>
            <option>♭</option>
        </select>
        <button id="add">add</button>
        <button id="bar">|</button>
        <br>
        <button id="undo">undo</button>
        <button id="redo">redo</button>       
        <button id="copy">copy</button>
        <button id="clear">clear</button>
    </div>
    <textarea></textarea>
    <script>
        let stateList = [];
        let stateIndex = 0;
        const textarea = document.querySelector('textarea');
        const onchord1 = document.querySelector('#onchord1');
        const onchord2 = document.querySelector('#onchord2');
        textarea.addEventListener('input', () => {
            stateIndex++;
            stateList.push(textarea.value);
        });
        setTimeout(() => {
            textarea.style.setProperty('width', `${innerWidth}px`);
            textarea.style.setProperty('height', `${innerHeight - document.querySelector('#header').clientHeight}px`);
        }, 100);
        document.querySelector('#add').addEventListener('click', () => {
            let chordValue = `${document.querySelector('#chord1').value}${document.querySelector('#chord2').value}${document.querySelector('#chord3').value}`;
            let tensionList = [];
            for (const element of document.querySelector('#tension').children) {
                if (element.selected) {
                    tensionList.push(element.value);
                }
            }
            const tension = tensionList.join(',');
            if (tension) {
                chordValue += `(${tension})`;
            }
            if (onchord1.value) {
                chordValue += `on${onchord1.value}${onchord2.value}`;
            }
            insert(chordValue);
        });
        document.querySelector('#bar').addEventListener('click', () => insert('|'));
        function insert(value) {
            const tempValue = textarea.value;
            const prefix = tempValue.substring(0, textarea.selectionStart);
            const suffix = tempValue.substring(textarea.selectionEnd);
            textarea.value = `${prefix}${prefix.endsWith(' ') ? '' : ' '}${value}${suffix.startsWith(' ') ? '' : ' '}${suffix}`;
        }
        onchord1.addEventListener('change', handleOnchord);
        onchord2.addEventListener('change', handleOnchord);
        function handleOnchord() {
            if (!onchord1.value) {
                onchord2.value = '';
            }
        };
        document.querySelector('#undo').addEventListener('click', () => {
            stateIndex--;
            textarea.value = stateList[stateIndex];
        });
        document.querySelector('#copy').addEventListener('click', () => {
            textarea.select();
            document.execCommand('copy');
            alert(`Copied\n\n${textarea.value}`);
        });
        document.querySelector('#clear').addEventListener('click', () => {
            textarea.value = '';
        });
    </script>
</body>

</html>
