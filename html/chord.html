<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>гӮігғјгғүйҖІиЎҢ</title>
</head>

<body>
    <div id="header">
        <button id="load">load</button>
        <button id="save">save</button>
        <button id="copy">copy</button>
        <button id="clear">clear</button>
    </div>
    <input type="text" id="title" placeholder="гӮҝгӮӨгғҲгғ«">
    <textarea></textarea>
    <div id="controller"></div>
    <script>
        const chords = ['|', 'C', 'D', 'E', 'F', 'G', 'A', 'B'];
        const options = ['#', 'вҷӯ', 'm', '7', 'm7', 'M7', 'mM7', '6', 'm6', 'sus4', '7sus4', 'm7-5', 'dim', 'aug', 'add2'];
        const tensions = ['(', ')', ',', 'вҷӯ9', '9', '#9', '#11', 'вҷӯ13', '13', 'on'];
        const sections = ['гӮӨгғігғҲгғӯ', 'AгғЎгғӯ', 'BгғЎгғӯ', 'гӮөгғ“', 'й–“еҘҸ', 'CгғЎгғӯ', 'гӮҪгғӯ', 'гӮўгӮҰгғҲгғӯ', '\n'];
        const titlearea = document.querySelector('#title');
        const textarea = document.querySelector('textarea');
        const controller = document.querySelector('#controller');
        setTimeout(setSize, 100);
        visualViewport.addEventListener('resize', setSize);
        chords.concat(options).concat(tensions).concat(sections).forEach(value => {
            const button = document.createElement('button');
            button.textContent = value.replace(/\n/, 'ж”№иЎҢ');
            controller.append(button);
            button.addEventListener('click', () => {
                const tempValue = textarea.value;
                const tempPos = textarea.selectionStart;
                const prefix = tempValue.substring(0, tempPos);
                const suffix = tempValue.substring(textarea.selectionEnd);
                const prefixSpace = chords.includes(value) && !prefix.endsWith(' ') && !prefix.endsWith('on') && !prefix.endsWith('\n') && prefix !== '' ? ' ' : '';
                const suffixSpace = chords.includes(suffix.substring(0, 1)) && !value.endsWith(' ') && !value.endsWith('on') ? ' ' : '';
                const insertText = `${prefixSpace}${value}`;
                textarea.value = `${prefix}${insertText}${suffixSpace}${suffix}`;
                const pos = tempPos + insertText.length;
                textarea.selectionStart = pos;
                textarea.selectionEnd = pos;
            });
        });
        document.querySelector('#load').addEventListener('click', () => textarea.value = localStorage.getItem(titlearea.value));
        document.querySelector('#save').addEventListener('click', () => {
            const title = titlearea.value;
            const text = textarea.value;
            if (title === '') {
                return;
            }
            if (text === '' && localStorage.getItem(title)) {
                localStorage.removeItem(title)
            } else {
                localStorage.setItem(title, text);
            }
        });
        document.querySelector('#copy').addEventListener('click', () => {
            textarea.select();
            document.execCommand('copy');
            alert(`Copied!\n\n${textarea.value}`);
        });
        document.querySelector('#clear').addEventListener('click', () => textarea.value = '');
        function setSize() {
            const width = visualViewport.width;
            titlearea.style.setProperty('width', `${width}px`);
            textarea.style.setProperty('width', `${width}px`);
            controller.style.setProperty('width', `${width}px`);
            controller.style.setProperty('top', `${visualViewport.height - controller.clientHeight}px`);
            textarea.style.setProperty('height', `${visualViewport.height - document.querySelector('#header').clientHeight - titlearea.clientHeight - controller.clientHeight}px`);
        }
    </script>
</body>

</html>
