<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>コード進行</title>
</head>

<body>
    <div>
        <span>Key=</span>
        <select id="key">
            <option>C</option>
            <option>D♭</option>
            <option>D</option>
            <option>E♭</option>
            <option>E</option>
            <option>F</option>
            <option>G♭</option>
            <option>G</option>
            <option>A♭</option>
            <option>A</option>
            <option>B♭</option>
            <option>B</option>
            <option>Cm</option>
            <option>C#m</option>
            <option>Dm</option>
            <option>E♭m</option>
            <option>Em</option>
            <option>Fm</option>
            <option>F#m</option>
            <option>Gm</option>
            <option>G#m</option>
            <option>Am</option>
            <option>B♭m</option>
            <option>Bm</option>
        </select>
        <span>BPM=</span>
        <input type="number" id="bpm" value="120">
    </div>
    <div>
        <select id="chord1">
            <option>C</option>
            <option>D</option>
            <option>E</option>
            <option>F</option>
            <option>G</option>
            <option>A</option>
            <option>B</option>
        </select>
        <select id="chord2">
            <option></option>
            <option>#</option>
            <option>♭</option>
        </select>
        <select id="chord3">
            <option></option>
            <option>m</option>
            <option>7</option>
            <option>m7</option>
            <option>M7</option>
            <option>mM7</option>
            <option>6</option>
            <option>m6</option>
            <option>sus4</option>
            <option>7sus4</option>
            <option>m7-5</option>
            <option>dim</option>
            <option>aug</option>
        </select>
        <span>(</span>
        <select id="tension" multiple>
            <option></option>
            <option>♭9</option>
            <option>9</option>
            <option>#9</option>
            <option>#11</option>
            <option>♭13</option>
            <option>13</option>
        </select>
        <span>)on</span>
        <select id="onchord1">
            <option></option>
            <option>C</option>
            <option>D</option>
            <option>E</option>
            <option>F</option>
            <option>G</option>
            <option>A</option>
            <option>B</option>
        </select>
        <select id="onchord2">
            <option></option>
            <option>#</option>
            <option>♭</option>
        </select>
        <button id="add">Add</button>
        <button id="addRow">AddRow</button>
    </div>
    <hr>
    <table>
        <tbody id="result">
            <tr></tr>
        </tbody>
    </table>
    <script>
        let index = 0;
        const onchord1 = document.querySelector('#onchord1');
        const onchord2 = document.querySelector('#onchord2');
        document.querySelector('#add').addEventListener('click', () => {
            const td = document.createElement('td');
            let chordValue = `${document.querySelector('#chord1').value}${document.querySelector('#chord2').value}${document.querySelector('#chord3').value}`;
            let tensionList = [];
            for (const element of document.querySelector('#tension').children) {
                if (element.selected) {
                    tensionList.push(element.value);
                }
            }
            if (tensionList.length) {
                chordValue += `(${tensionList.join(',')})`;
            }
            if (onchord1.value) {
                chordValue += `on${onchord1.value}${onchord2.value}`;
            }
            td.textContent = chordValue;
            td.addEventListener('click', e => {
                index = e.target.parentElement.rowIndex;
                e.target.remove()
            });
            document.querySelectorAll('tr').forEach(row => {
                if (row.rowIndex === index) {
                    row.append(td);
                }
            });
        });
        document.querySelector('#addRow').addEventListener('click', () => {
            const tr = document.createElement('tr');
            document.querySelector('#result').append(tr);
            index = tr.rowIndex;
        });
        onchord1.addEventListener('change', () => {
            if (!onchord1.value) {
                onchord2.value = '';
            }
        });
        onchord2.addEventListener('change', () => {
            if (!onchord1.value) {
                onchord2.value = '';
            }
        });
    </script>
</body>

</html>
