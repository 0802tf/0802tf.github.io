<!DOCTYPE HTML>
<html>

<head>
	<meta charset='utf-8'>
	<meta http-equiv="content-type" content="text/html" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="favicon.ico" type="image/x-icon" />
	<title>abcjs editor</title>
	<link href="https://www.abcjs.net/abcjs-audio.css" media="all" rel="stylesheet" />
	<script src="https://www.abcjs.net/abcjs-basic-min.js"></script>
	<style>
		@media print {

			h1,
			p,
			textarea,
			#selection,
			#audio,
			#warnings,
			hr {
				display: none;
			}
		}

		#abc {
			width: 100vw;
			height: 50vh;
		}

		.paper {
			overflow: auto !important;
		}

		#selection {
			border: solid;
		}
	</style>
</head>

<body>
	<textarea name="abc" id="abc" cols="80" rows="15">
X: 1
T: Cooley's
M: 4/4
L: 1/8
R: reel
K: Emin
|:D2|EB{c}BA B2 EB|~B2 AB dBAG|FDAD BDAD|FDAD dAFD|
EBBA B2 EB|B2 AB defg|afe^c dBAF|DEFD E2:|
|:gf|eB B2 efge|eB B2 gedB|A2 FA DAFA|A2 FA defg|
eB B2 eBgB|eB B2 defg|afe^c dBAF|DEFD E2:|
	</textarea>
	<div id="paper" class="paper"></div>
	<div id="audio"></div>
	<div id="warnings"></div>
	<pre id="selection"></pre>
	<script>
		function selectionCallback(abcelem) {
			const note = {};
			for (const key in abcelem) {
				if (abcelem.hasOwnProperty(key) && key !== 'abselem') {
					note[key] = abcelem[key];
				}
			}
			document.querySelector('#selection').textContent = JSON.stringify(note, null, 2);
		}
		function initEditor() {
			new ABCJS.Editor('abc', {
				paper_id: 'paper',
				synth: {
					el: '#audio',
					options: {
						displayLoop: true,
						displayRestart: true,
						displayPlay: true,
						displayProgress: true,
						displayWarp: true
					}
				},
				generate_warnings: true,
				warnings_id: 'warnings',
				abcjsParams: {
					generateDownload: true,
					clickListener: selectionCallback
				}
			});
		}
		addEventListener('load', initEditor, false);
	</script>
</body>

</html>
