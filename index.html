<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Index</title>
</head>

<body>
    <ul></ul>
    <script>
        fetch('./index.txt').then(response => response.text()).then(data => {
            const list = data.split('\n');
            list.pop();
            list.forEach(value => {
                const li = document.createElement('li');
                document.querySelector('ul').appendChild(li);
                const a = document.createElement('a');
                const name = `./${value}`;
                a.setAttribute('href', name);
                li.appendChild(a);
                fetch(name).then(response => response.text()).then(text => {
                    if (name.endsWith('.html')) {
                        const result = /<title>(.+?)<\/title>/.exec(text);
                        a.textContent = result[1] || value;
                    } else if (name.endsWith('.md')) {
                        const lines = text.split('\n')
                        const title = lines[0].replace('\r', '').replace('# ', '');
                        a.textContent = title || value;
                    } else {
                        a.textContent = value;
                    }
                });
            });
        });
    </script>
</body>

</html>
